id: PAT-CS-001
domain: customer-service
type: resolution-template
confidence: medium
source_deployments: 1
created: 2026-04-02
title: "Tracking queries are candidates for bounded automation with order API lookup"
context: |
  Tracking/shipping status queries are frequent in DTC support and often rely on structured order data. Exceptions still require judgment and policy.
pattern: |
  1. Customer asks about order status
  2. Agent extracts email or order number
  3. API call to Shopify Orders for tracking URL and status
  4. If shipped: respond with carrier, tracking link, estimated delivery
  5. If issue: escalate to human with full context
  Authority: lookup may execute read-only; customer send remains propose-only until the named send capability passes review, rollback and closure gates.
conditions:
  - DTC ecommerce with Shopify or equivalent
  - Tracking data available via API
anti_patterns:
  - Dont promise delivery dates the carrier hasnt confirmed
  - Dont auto-respond to lost package complaints (escalate)
metrics:
  - "Target: verified closure rate >=80% over at least 10 reviewed runs"
  - "Guardrail: 0 authority violations and 100% source freshness checks"
tags: [cs, tracking, automation, shopify]
