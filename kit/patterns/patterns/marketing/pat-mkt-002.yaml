id: pat-mkt-002
title: Data-Driven Copy Engine from Historical Campaigns
domain: marketing
summary: >
  A structured knowledge base built from analyzing 1,000+ historical email marketing
  campaigns, extracting subject line formulas, copy patterns, and performance data.
  Each formula is backed by real open rate, click rate, and revenue metrics.
  Enables any team member or AI agent to generate high-performing copy by selecting
  proven patterns rather than guessing.
context:
  trigger: New email campaign needs subject line or copy
  industry: D2C ecommerce with substantial email marketing history
  team_size: 1-3 marketing team members
metrics:
  campaigns_analyzed: 1114
  subject_line_formulas_extracted: 50+
  all_caps_revenue_multiplier: 2.7x
  data_points_per_formula: open_rate, click_rate, revenue, sample_size
implementation:
  components:
    - Historical campaign data export (ESP API)
    - Analysis pipeline grouping campaigns by subject line pattern
    - Formula catalog with performance benchmarks per pattern
    - Integration with campaign creation workflow for formula suggestions
  cost: One-time analysis effort, then near-zero ongoing
  complexity: Medium
  setup_time: 1-2 weeks for initial analysis
risks:
  - Historical performance does not guarantee future results; audience fatigue is real
  - Overuse of high-performing patterns (e.g., ALL CAPS) will degrade effectiveness
  - Seasonal and product-mix differences affect comparability
tags: [marketing, email, copywriting, data-driven, subject-lines]
